<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EE5531 - Victor - 3D LiDAR Map v4</title>

  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/potree/potree.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/jquery-ui/jquery-ui.min.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/openlayers3/ol.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/spectrum/spectrum.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/jstree/themes/mixed/style.css">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
    }

    #titlebar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.96);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      box-sizing: border-box;
    }

    #potree_render_area {
      position: absolute;
      top: 56px;
      left: 0;
      width: 100%;
      height: calc(100% - 56px);
      background: #000;
    }

    #potree_sidebar_container,
    #potree_menu,
    .potree_menu_toggle {
      display: none !important;
    }

    #statusbox {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 1200;
      max-width: 420px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 10px 12px;
      font: 13px/1.4 monospace;
      border: 1px solid #444;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #statusbox.ok {
      border-color: #2e7d32;
    }

    #statusbox.err {
      border-color: #c62828;
      color: #ffb3b3;
    }
  </style>
</head>

<body>
  <div id="titlebar">EE5531 - Victor - 3D LiDAR Map v4</div>
  <div id="potree_render_area"></div>
  <div id="potree_sidebar_container"></div>
  <div id="statusbox">Loading viewer...</div>

  <script src="./resources/page_template/libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="./resources/page_template/libs/spectrum/spectrum.js"></script>
  <script src="./resources/page_template/libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="./resources/page_template/libs/other/BinaryHeap.js"></script>
  <script src="./resources/page_template/libs/tween/tween.min.js"></script>
  <script src="./resources/page_template/libs/d3/d3.js"></script>
  <script src="./resources/page_template/libs/proj4/proj4.js"></script>
  <script src="./resources/page_template/libs/openlayers3/ol.js"></script>
  <script src="./resources/page_template/libs/i18next/i18next.js"></script>
  <script src="./resources/page_template/libs/jstree/jstree.js"></script>
  <script src="./resources/page_template/libs/potree/potree.js"></script>
  <script src="./resources/page_template/libs/plasio/js/laslaz.js"></script>

  <script>
    const statusBox = document.getElementById("statusbox");
    function setStatus(msg, isError = false, isOk = false) {
      statusBox.textContent = msg;
      statusBox.className = isError ? "err" : (isOk ? "ok" : "");
    }

    window.onerror = function(message, source, lineno, colno) {
      setStatus(`JS error:\n${message}\n${source || ""}:${lineno || ""}:${colno || ""}`, true);
    };

    window.onunhandledrejection = function(event) {
      const msg = event?.reason?.message || String(event?.reason || "Unhandled promise rejection");
      setStatus(`Promise error:\n${msg}`, true);
    };

    const metadataUrl = "./pointclouds/victor_0.mcap/metadata.json";

    setStatus("Checking metadata...");

    fetch(metadataUrl, { cache: "no-store" })
      .then((res) => {
        if (!res.ok) throw new Error(`metadata fetch failed: ${res.status} ${res.statusText}`);
        return res.json();
      })
      .then(() => {
        setStatus("Metadata OK. Loading point cloud...");

        window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
        viewer.setEDLEnabled(false);
        viewer.setFOV(60);
        viewer.setPointBudget(2000000);
        viewer.setBackground("black");

        Potree.loadPointCloud(metadataUrl, "map", function (e) {
          if (!e || !e.pointcloud) {
            setStatus("Potree returned no point cloud object.", true);
            return;
          }

          const pointcloud = e.pointcloud;
          const material = pointcloud.material;

          material.activeAttributeName = "elevation";
          material.elevationRange = [-2, 8];
          material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
          material.shape = Potree.PointShape.SQUARE;
          material.size = 1.0;

          viewer.scene.addPointCloud(pointcloud);

          setTimeout(() => {
            try {
              viewer.fitToScreen();
              setStatus("Point cloud loaded.", false, true);
            } catch (err) {
              setStatus(`Loaded, but fit failed:\n${err.message}`, true);
            }
          }, 150);
        });
      })
      .catch((err) => {
        setStatus(`Load failed:\n${err.message}`, true);
      });
  </script>
</body>
</html>
