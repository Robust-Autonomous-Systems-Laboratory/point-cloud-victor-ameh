<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EE5531 - Victor - 3D LiDAR Map</title>

  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/potree/potree.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/jquery-ui/jquery-ui.min.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/openlayers3/ol.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/spectrum/spectrum.css">
  <link rel="stylesheet" type="text/css" href="./resources/page_template/libs/jstree/themes/mixed/style.css">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
    }

    #titlebar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.95);
      color: #fff;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      padding: 14px 16px;
      box-sizing: border-box;
    }

    #potree_render_area {
      position: absolute;
      top: 56px;
      left: 0;
      width: 100%;
      height: calc(100% - 56px);
      background: #000;
    }

    #potree_sidebar_container,
    #potree_menu,
    .potree_menu_toggle {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="titlebar">EE5531 - Victor - 3D LiDAR Map</div>

  <div id="potree_render_area"></div>
  <div id="potree_sidebar_container"></div>

  <script src="./resources/page_template/libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="./resources/page_template/libs/spectrum/spectrum.js"></script>
  <script src="./resources/page_template/libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="./resources/page_template/libs/other/BinaryHeap.js"></script>
  <script src="./resources/page_template/libs/tween/tween.min.js"></script>
  <script src="./resources/page_template/libs/d3/d3.js"></script>
  <script src="./resources/page_template/libs/proj4/proj4.js"></script>
  <script src="./resources/page_template/libs/openlayers3/ol.js"></script>
  <script src="./resources/page_template/libs/i18next/i18next.js"></script>
  <script src="./resources/page_template/libs/jstree/jstree.js"></script>
  <script src="./resources/page_template/libs/potree/potree.js"></script>
  <script src="./resources/page_template/libs/plasio/js/laslaz.js"></script>

  <script>
    window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

    viewer.setEDLEnabled(false);
    viewer.setFOV(60);
    viewer.setPointBudget(2000000);
    viewer.setBackground("black");
    viewer.setDescription("EE5531 - Victor - 3D LiDAR Map");

    Potree.loadPointCloud("./pointclouds/victor_0.mcap/metadata.json", "map", function (e) {
      const pointcloud = e.pointcloud;
      const material = pointcloud.material;

      material.activeAttributeName = "elevation";
      material.elevationRange = [-2, 8];
      material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
      material.shape = Potree.PointShape.SQUARE;
      material.size = 1.0;

      viewer.scene.addPointCloud(pointcloud);
      viewer.fitToScreen();
    });
  </script>
</body>
</html>
